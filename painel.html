<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Candidatos — Chapel Nº 129</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="favicon-180.png">
<style>
  :root{
    --crimson:#8C322B; --crimson-d:#6E2722; --gold:#9E814C; --gold-l:#C9A227;
    --stone:#F5F2EA; --stone-2:#FBFAF6; --ink:#2B2B2B; --line:#E2D9C7;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Georgia,'Times New Roman',serif;color:var(--ink);background:var(--stone);line-height:1.6}
  a{color:var(--crimson)}
  .wrap{max-width:1160px;margin:0 auto;padding:0 24px}
  nav{position:sticky;top:0;z-index:20;background:var(--crimson-d);box-shadow:0 2px 6px rgba(0,0,0,.18)}
  nav .wrap{display:flex;align-items:center;justify-content:space-between;height:54px}
  nav .brand{color:#fff;font-size:.82rem;letter-spacing:.16em;text-transform:uppercase}
  nav .brand b{color:var(--gold-l)}
  nav ul{list-style:none;display:flex;gap:8px}
  nav a{color:#f0e7da;text-decoration:none;font-size:.8rem;letter-spacing:.12em;text-transform:uppercase;padding:8px 14px;border-radius:20px;transition:.2s}
  nav a:hover,nav a.active{background:var(--crimson);color:#fff}
  header.ph{background:linear-gradient(160deg,var(--crimson),var(--crimson-d));color:#fff;padding:30px 24px;border-bottom:4px solid var(--gold-l)}
  header.ph .wrap{display:flex;align-items:center;gap:18px}
  header.ph img{width:64px;height:64px;object-fit:contain;filter:drop-shadow(0 3px 8px rgba(0,0,0,.4))}
  header.ph h1{font-size:1.5rem}
  header.ph .sub{color:var(--gold-l);font-style:italic;font-size:.95rem}
  .toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:26px 0 8px}
  .toolbar input,.toolbar select{font-family:inherit;font-size:.92rem;padding:9px 12px;border:1px solid var(--line);border-radius:6px;background:#fff}
  .toolbar input{flex:1;min-width:200px}
  .chip{font-family:Arial,sans-serif;font-size:.72rem;letter-spacing:.04em;padding:3px 10px;border-radius:20px;color:#fff;white-space:nowrap;display:inline-block}
  .s-assin{background:#8a7f6a}.s-pag{background:#b08400}.s-loja{background:#2b6ca3}
  .s-cap{background:#3f51b5}.s-prec{background:#2a8a86}.s-aprov{background:#7b3fa0}
  .s-ar{background:#c4622d}.s-consag{background:#6b8e23}.s-ok{background:#2f7d32}.s-rec{background:#5b7a8c}.s-na{background:#9a9183}
  .stats{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 18px;font-family:Arial,sans-serif;font-size:.85rem;color:#6f665a;align-items:center}
  .stats b{color:var(--crimson-d)}
  table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  thead th{background:var(--crimson);color:#fff;font-size:.78rem;letter-spacing:.06em;text-transform:uppercase;padding:11px 12px;text-align:left;font-family:Arial,sans-serif}
  tbody td{padding:10px 12px;border-top:1px solid var(--line);font-size:.92rem;vertical-align:top}
  tbody tr:nth-child(even){background:var(--stone-2)}
  tbody tr:hover{background:#f3ece0}
  .nm{font-weight:bold;color:var(--crimson-d)}
  .muted{color:#8a8275;font-size:.84rem}
  .lbl{color:#b3a98f;font-size:.7rem;text-transform:uppercase;letter-spacing:.04em}
  .empty{text-align:center;padding:60px 20px;color:#8a8275}
  .empty img{width:90px;opacity:.5;margin-bottom:14px}
  footer{background:var(--crimson-d);color:#e9ddd0;text-align:center;padding:24px;font-size:.82rem;margin-top:40px}
</style>
</head>
<body>
  <nav>
    <div class="wrap">
      <div class="brand">St Thomas of Acon · <b>Chapel 129</b></div>
      <ul>
        <li><a href="index.html">Início</a></li>
        <li><a href="formulario.html">Formulário</a></li>
        <li><a class="active" href="painel.html">Painel</a></li>
      </ul>
    </div>
  </nav>
  <header class="ph">
    <div class="wrap">
      <img src="logo.png" alt="">
      <div>
        <h1>Painel de Candidatos</h1>
        <div class="sub">Capela Master Felício de Paulo Nº 129</div>
      </div>
    </div>
  </header>
  <div class="wrap">
    <div class="toolbar">
      <input id="q" type="text" placeholder="Buscar por nome, cidade, loja, capítulo…">
      <select id="fStatus">
        <option value="">Todas as etapas</option>
        <option value="Recebida">📥 Recebida — aguardando análise</option>
        <option value="Assinatura">✍️ Falta Assinatura</option>
        <option value="Pagamento">💰 Falta Pagamento</option>
        <option value="Loja">🏛️ Falta Clearance Loja</option>
        <option value="Capítulo">🔯 Falta Clearance Capítulo</option>
        <option value="Preceptório">⚔️ Falta Clearance Preceptório</option>
        <option value="Aprovação">⚖️ Aguardando Aprovação</option>
        <option value="Enviar AR">📤 Falta Enviar AR</option>
        <option value="Consagração">🕯️ Aguardando Consagração</option>
        <option value="Concluído">✅ Concluído</option>
      </select>
    </div>
    <div class="stats" id="stats"></div>
    <table>
      <colgroup><col style="width:20%"><col style="width:14%"><col style="width:13%"><col style="width:35%"><col style="width:18%"></colgroup>
      <thead><tr><th>Candidato</th><th>Nomen</th><th>Cidade/UF</th><th>Loja · Capítulo · Preceptório</th><th>Status</th></tr></thead>
      <tbody id="rows"><tr><td colspan="5" class="empty">Carregando…</td></tr></tbody>
    </table>
  </div>
  <footer>Chapel Master Felício de Paulo Nº 129 · Order of St Thomas of Acon · Province of South America</footer>
<script>
const CONFIG = { csvUrl: "https://docs.google.com/spreadsheets/d/1lT4eAz79o0F_j9sLvcUSk7TQ1CAJssBy3VmPa9NqurU/gviz/tq?tqx=out:csv&sheet=Painel" };
let DATA = [];
const $=s=>document.querySelector(s);
function parseCSV(t){
  const rows=[]; let row=[],cur="",q=false;
  for(let i=0;i<t.length;i++){const c=t[i];
    if(q){ if(c==='"'){ if(t[i+1]==='"'){cur+='"';i++;} else q=false;} else cur+=c; }
    else { if(c==='"')q=true; else if(c===','){row.push(cur);cur="";}
      else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur="";}
      else if(c==='\r'){} else cur+=c; } }
  if(cur!==""||row.length){row.push(cur);rows.push(row);}
  return rows;
}
function chipClass(s){
  s=(s||'').toLowerCase();
  if(s.includes('conclu')) return 's-ok';
  if(s.includes('consagra')) return 's-consag';
  if(s.includes('enviar ar')) return 's-ar';
  if(s.includes('aprova')) return 's-aprov';
  if(s.includes('precept')) return 's-prec';
  if(s.includes('capítulo')||s.includes('capitulo')) return 's-cap';
  if(s.includes('loja')) return 's-loja';
  if(s.includes('pagamento')) return 's-pag';
  if(s.includes('recebida')||s.includes('análise')||s.includes('analise')) return 's-rec';
  if(s.includes('assinatura')) return 's-assin';
  return 's-na';
}
function render(){
  const term=$('#q').value.toLowerCase().trim();
  const f=$('#fStatus').value;
  const list=DATA.filter(d=>{
    if(f && !(d.status||'').includes(f)) return false;
    if(term && !((d.nome+d.nomen+d.cidade+d.loja+d.capitulo+d.preceptorio).toLowerCase().includes(term))) return false;
    return true;
  });
  const tb=$('#rows');
  if(!list.length){ tb.innerHTML='<tr><td colspan="5" class="empty"><img src="emb_0.png"><br>Nenhum candidato encontrado.</td></tr>'; }
  else tb.innerHTML=list.map(d=>`<tr>
    <td><span class="nm">${d.nome||'—'}</span><br><span class="muted">${d.email||''}</span></td>
    <td>${d.nomen||'—'}</td>
    <td>${d.cidade||'—'}</td>
    <td><span class="lbl">Loja</span> ${d.loja||'—'}<br>
        <span class="lbl">Cap.</span> ${d.capitulo||'—'}<br>
        <span class="lbl">Prec.</span> ${d.preceptorio||'—'}</td>
    <td><span class="chip ${chipClass(d.status)}">${d.status||'—'}</span></td>
  </tr>`).join('');
  const counts={};
  DATA.forEach(d=>{ const s=d.status||'—'; counts[s]=(counts[s]||0)+1; });
  let chips=`<span>Total: <b>${DATA.length}</b></span>`;
  Object.keys(counts).sort().forEach(s=>{ chips+=`<span class="chip ${chipClass(s)}">${s} ${counts[s]}</span>`; });
  $('#stats').innerHTML=chips;
}
async function load(){
  try{
    const r=await fetch(CONFIG.csvUrl); const rows=parseCSV(await r.text());
    DATA=rows.slice(1).filter(r=>r.some(x=>x&&x.trim())).map(r=>({
      nome:r[0]||'', nomen:r[1]||'', cidade:r[2]||'', loja:r[3]||'',
      capitulo:r[4]||'', preceptorio:r[5]||'', status:r[6]||'', email:r[7]||''
    }));
    render();
  }catch(e){ $('#rows').innerHTML='<tr><td colspan="5" class="empty">Erro ao carregar a planilha.</td></tr>'; }
}
$('#q').addEventListener('input',render); $('#fStatus').addEventListener('change',render);
load();
</script>
</body>
</html>
